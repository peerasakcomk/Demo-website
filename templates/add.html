<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เพิ่มเมนูใหม่ - Fried Chicken Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fdf0d5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 8px 30px rgba(230,57,70,0.1); width: 100%; max-width: 450px; border-top: 6px solid #ffb703; }
        h1 { color: #e63946; font-size: 26px; text-align: center; margin-top: 0; margin-bottom: 30px; font-weight: 600; }
        label { font-size: 15px; color: #555; margin-bottom: 8px; display: block; font-weight: 500; }
        input, select { width: 100%; padding: 12px 15px; margin-bottom: 20px; border: 1.5px solid #eee; border-radius: 8px; box-sizing: border-box; font-family: 'Kanit'; font-size: 15px; background-color: #fafafa; transition: border-color 0.3s; }
        input:focus, select:focus { border-color: #e63946; outline: none; background-color: #fff; box-shadow: 0 0 0 3px rgba(230,57,70,0.1); }
        button { width: 100%; padding: 14px; background: #e63946; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; font-family: 'Kanit'; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #c1121f; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230,57,70,0.3); }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #888; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
        .back-link:hover { color: #e63946; }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>🍗 เพิ่มเมนูไก่ทอด</h1>
        <form method="POST">
            <label>ชื่อเมนู</label>
            <input type="text" name="name" placeholder="เช่น ไก่ทอดวิงซ์แซ่บ (6 ชิ้น)" required>
            
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>ราคา (บาท)</label>
                    <input type="number" name="price" placeholder="0.00" step="0.01" required>
                </div>
                <div style="flex: 1;">
                    <label>จำนวนสต็อก</label>
                    <input type="number" name="stock" placeholder="0" required>
                </div>
            </div>
            
            <label>ลิงก์รูปภาพ (URL)</label>
            <input type="url" name="image" placeholder="https://..." required>
            
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>หมวดหมู่</label>
                    <select name="category_id">
                        {% for c in categories %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>หน่วยนับ</label>
                    <select name="unit_id">
                        {% for u in units %}
                            <option value="{{ u.id }}">{{ u.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit">➕ บันทึกเมนูใหม่</button>
        </form>
        <a href="/" class="back-link">← กลับไปหน้ารวมเมนู</a>
    </div>
</body>
</html>
